version: 2

models:
  - name: stg_customers
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique
      - name: customer_name
        tests:
          - not_null
      - name: country
        tests:
          - not_null
      - name: city
        tests:
          - not_null
      - name: signup_date
        tests:
          - not_null

  - name: stg_products
    columns:
      - name: product_id
        tests:
          - not_null
          - unique
      - name: product_name
        tests:
          - not_null
      - name: category
        tests:
          - not_null
      - name: list_price
        tests:
          - not_null
      - name: cost
        tests:
          - not_null

  - name: stg_orders
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id
      - name: product_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_products')
              field: product_id
      - name: quantity
        tests:
          - not_null
      - name: unit_price
        tests:
          - not_null
      - name: order_status
        tests:
          - not_null
          - accepted_values:
              values: ["completed", "cancelled", "refunded", "pending"]
      - name: sales_channel
        tests:
          - not_null
          - accepted_values:
              values: ["online", "store", "partner"]
      - name: order_date
        tests:
          - not_null
